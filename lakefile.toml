name = "conceptual_mathematics"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["ConceptualMathematics"]

[leanOptions]
weak.linter.hashCommand = false
weak.linter.mathlibStandardSet = true
weak.linter.style.emptyLine = false
weak.linter.style.longLine = false
weak.linter.style.missingEnd = false
weak.linter.style.setOption = false
maxSynthPendingDepth = 3
pp.rawOnError = true
pp.unicode.fun = true

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0"

[[lean_lib]]
name = "ConceptualMathematics"
